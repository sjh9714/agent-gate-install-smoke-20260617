version: 1
mode: warn

contract:
  required_for:
    - agent
  allow_missing_in_observe_mode: true

agent_detection:
  labels:
    - ai
    - agent
    - codex
  branch_patterns:
    - "codex/**"

high_risk_paths:
  workflows:
    paths:
      - ".github/workflows/**"
    severity: error

github_actions:
  block_permission_escalation: true
  block_pull_request_target_checkout: true
  require_pinned_actions: warn
