name: Agent Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  agent-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: sjh9714/Agent-Gate@v0.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: warn
          fail-on-block: false

      - name: Verify report finding IDs
        run: |
          grep -E 'Finding ID: `agf_[0-9a-f]{16}`' agent-gate-report.md
          grep -E '"findingId": "agf_[0-9a-f]{16}"' agent-gate-report.json
