name: Agent Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  agent-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: sjh9714/Agent-Gate@963a8ea03bfb64aae2e5e0174b6190a52c479ec6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: warn
          fail-on-block: false
      - name: Verify default policy report
        run: |
          test -f agent-gate-report.json
          test -f agent-gate-report.md
          grep -q '"configSource": "default"' agent-gate-report.json
          grep -q 'Policy source: built-in default' agent-gate-report.md
